<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AI Chatbot Platform — local LLM assistant with session memory"
    />
    <title>AI Chatbot Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <aside id="sidebar" class="sidebar" aria-label="Conversations">
        <header class="sidebar__header">
          <div class="brand">
            <span class="brand__mark" aria-hidden="true"></span>
            <span class="brand__name">Nexus</span>
          </div>
          <button
            id="sidebar-close"
            type="button"
            class="icon-btn sidebar__close"
            aria-label="Close sidebar"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </header>

        <button id="new-chat-btn" type="button" class="btn btn--primary btn--new-chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          New chat
        </button>

        <nav class="sidebar__sessions" aria-label="Session list">
          <p id="sessions-empty" class="sidebar__empty hidden">No conversations yet</p>
          <ul id="session-list" class="session-list"></ul>
        </nav>

        <footer class="sidebar__footer">
          <p class="sidebar__meta">
            <span id="model-badge" class="model-badge">phi3:mini</span>
            <span class="status-dot" id="status-dot" title="API status"></span>
          </p>
        </footer>
      </aside>

      <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>

      <main class="main">
        <header class="main__header">
          <button
            id="sidebar-toggle"
            type="button"
            class="icon-btn main__menu"
            aria-label="Open conversations"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M3 12h18M3 18h18"/>
            </svg>
          </button>
          <h1 id="chat-title" class="main__title">New conversation</h1>
        </header>

        <section id="chat-viewport" class="chat-viewport" aria-live="polite">
          <div id="welcome" class="welcome">
            <div class="welcome__icon" aria-hidden="true">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/>
                <path d="M5 19l1 3 3-1-1-3-3 1zM19 13l1 3 3-1-1-3-3 1z"/>
              </svg>
            </div>
            <h2 class="welcome__title">How can I help you today?</h2>
            <p class="welcome__text">
              Start a conversation — your messages are remembered within each session.
            </p>
            <div class="welcome__hints">
              <button type="button" class="hint-chip" data-prompt="Explain Docker Compose in simple terms">
                Docker Compose basics
              </button>
              <button type="button" class="hint-chip" data-prompt="Write a Python function to reverse a string">
                Python helper
              </button>
              <button type="button" class="hint-chip" data-prompt="What are the benefits of Redis caching?">
                Redis caching
              </button>
            </div>
          </div>
          <ul id="message-list" class="message-list hidden"></ul>
          <div id="loading-indicator" class="loading-row hidden" aria-busy="true">
            <div class="message message--assistant message--loading">
              <div class="message__avatar" aria-hidden="true">AI</div>
              <div class="message__body">
                <div class="typing-dots">
                  <span></span><span></span><span></span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <footer class="composer">
          <form id="chat-form" class="composer__form">
            <div class="composer__box">
              <textarea
                id="prompt-input"
                class="composer__input"
                rows="1"
                placeholder="Message Nexus..."
                autocomplete="off"
                aria-label="Message input"
              ></textarea>
              <button
                id="send-btn"
                type="submit"
                class="icon-btn composer__send"
                aria-label="Send message"
                disabled
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
              </button>
            </div>
            <p class="composer__note">
              Powered by Ollama · Sessions persist in PostgreSQL · Responses cached in Redis
            </p>
          </form>
        </footer>
      </main>
    </div>

    <div id="toast" class="toast hidden" role="status"></div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
